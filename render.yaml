services:
  - type: web
    name: smm-elite-bd-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: SMMGEN_API_URL
        value: https://smmgen.com/api/v2
      - key: SMMGEN_API_KEY
        sync: false
